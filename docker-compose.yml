version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: 1group-cuisine-postgres
    environment:
      POSTGRES_USER: cuisine
      POSTGRES_PASSWORD: cuisine_dev
      POSTGRES_DB: onegroup_cuisine
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cuisine"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 1group-cuisine-network

  redis:
    image: redis:7-alpine
    container_name: 1group-cuisine-redis
    command: redis-server --appendonly yes --requirepass redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 1group-cuisine-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: 1group-cuisine-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q 'missing authentication credentials'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 1group-cuisine-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  esdata:
    driver: local

networks:
  1group-cuisine-network:
    driver: bridge
